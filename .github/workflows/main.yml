name: Automate GitHub Status

on:
  schedule:
    - cron: '0 * * * *' # Triggers at the top of every hour
  workflow_dispatch: # Enables manual trigger via Actions UI

jobs:
  update-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for the runner to commit changes back to repo
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history to ensure rebase stability

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Status Update
        env:
          GH_TOKEN: ${{ secrets.STATUS_TOKEN }}
        run: python update_status.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Stage the specific files we manage
          git add last_status.txt stats.json
          
          # Check for local changes to avoid Git Exit Code 128 (nothing to commit)
          if git diff --cached --quiet; then
            echo "No changes detected. Skipping commit."
            exit 0
          fi
          
          # Sync with remote branch to avoid push conflicts
          git pull --rebase origin main
          git commit -m "Automated update [skip ci]"
          git push origin main
