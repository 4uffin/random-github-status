name: Automate GitHub Status

on:
  schedule:
    - cron: '0 * * * *' # Executes at the start of every hour
  workflow_dispatch: # Allows manual trigger via the Actions tab

jobs:
  update-status:
    runs-on: ubuntu-latest
    timeout-minutes: 5 # Safety cutoff to prevent hung processes
    permissions:
      contents: write # Required for the bot to commit stats back to the repo
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history for robust rebasing

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Status Update
        env:
          GH_TOKEN: ${{ secrets.STATUS_TOKEN }}
        run: python update_status.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_status.txt stats.json
          git pull --rebase origin main # Ensures local state matches origin
          git commit -m "Automated update: status and stats [skip ci]" || exit 0
          git push origin main
