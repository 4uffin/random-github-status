name: Automate GitHub Status

on:
  schedule:
    - cron: '0 * * * *' # Triggers at the top of every hour
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  update-status:
    runs-on: ubuntu-latest
    timeout-minutes: 5 # Prevents a hung process from draining Actions minutes
    permissions:
      contents: write # Essential for the bot to commit stats.json and last_status.txt
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history to ensure rebase stability

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Status Update
        env:
          GH_TOKEN: ${{ secrets.STATUS_TOKEN }}
        run: python update_status.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_status.txt stats.json
          # Pull latest changes to avoid push conflicts if manual edits were made
          git pull --rebase origin main
          # Commit only if files have changed; otherwise exit gracefully
          git commit -m "Automated update: status synced [skip ci]" || exit 0
          git push origin main
